# fly.toml app configuration file generated for focusflow-2t3c2q on 2026-05-03T04:09:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'focusflow-2t3c2q'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  ANTHROPIC_MODEL = 'claude-sonnet-4-6'
  NODE_ENV = 'production'
  PORT = '3001'
  PUSHER_CLUSTER = 'ap4'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
