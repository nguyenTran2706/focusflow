# Fly.io config for FocusFlow API
# Run `fly launch --no-deploy --copy-config` to claim a unique app name,
# then `fly deploy`. See DEPLOY_FLY.md.

app = "focusflow-api"
primary_region = "syd"   # Sydney, Australia.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  PUSHER_CLUSTER = "ap4"
  ANTHROPIC_MODEL = "claude-sonnet-4-6"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"      # stop idle machines to save free-tier hours
  auto_start_machines = true       # auto-wake on incoming request
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
